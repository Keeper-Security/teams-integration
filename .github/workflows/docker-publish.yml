# Release workflow: builds and pushes Docker image to DockerHub on version tags.
#
# To create a release:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This will build and push keeper/teams-app:v1.0.0, :latest, and :sha

name: Build and Push Docker Image

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release
        run: task release TAG=${{ github.ref_name }}
