# Keeper Teams Bot - Docker Compose Configuration
# 
# This file orchestrates both Keeper Commander Service Mode and the Teams Bot.
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Run: docker-compose up -d
#
# Prerequisites:
#   - Azure Bot registration with CLIENT_ID, CLIENT_SECRET, TENANT_ID
#   - Keeper Commander KSM configuration
#   - Teams channel configured for approvals

services:
  # Keeper Commander Service Mode
  commander:
    container_name: keeper-service
    image: keeper/commander:latest
    ports:
      - "${COMMANDER_PORT:-8900}:8900"
    command: >
      service-create -p 8900 
      -c 'search, share-record, share-folder, record-add, one-time-share, pedm, device-approve, get' 
      -f json -q y 
      -ur ${KEEPER_USER_UID} 
      --ksm-config ${KSM_CONFIG} 
      --record ${KEEPER_RECORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8900/api/v2/queue/status || exit 1"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 30
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Keeper Teams Bot
  teams-bot:
    container_name: keeper-teams-bot
    build:
      context: .
      dockerfile: Dockerfile
    image: keeper/teams-bot:latest
    ports:
      - "${BOT_PORT:-3978}:3978"
      - "${HEALTH_PORT:-3979}:3979"
    environment:
      # ==================== KSM Configuration (Recommended for Production) ====================
      # When KSM is configured, credentials are fetched from Keeper Vault
      # This is more secure than storing credentials in environment variables
      
      # KSM Configuration - Base64 encoded KSM config or file path
      - KSM_CONFIG=${KSM_CONFIG:-}
      
      # KSM Record Titles (or UIDs) for credential lookup
      - COMMANDER_RECORD=${COMMANDER_RECORD:-CSMD config}
      - TEAMS_RECORD=${TEAMS_RECORD:-CSMD teams config}
      
      # ==================== Fallback: Azure Bot Configuration ====================
      # These are used if KSM is not configured (for local development)
      - CLIENT_ID=${CLIENT_ID:-}
      - CLIENT_SECRET=${CLIENT_SECRET:-}
      - TENANT_ID=${TENANT_ID:-}
      - BOT_TYPE=${BOT_TYPE:-MultiTenant}
      
      # ==================== Fallback: Keeper Service Mode Connection ====================
      # Used if KSM is not configured
      - KEEPER_SERVICE_URL=http://commander:8900/api/v2/
      - KEEPER_API_KEY=${KEEPER_API_KEY:-}
      
      # ==================== Fallback: Teams Channel Configuration ====================
      # Used if KSM is not configured
      - APPROVALS_CHANNEL_ID=${APPROVALS_CHANNEL_ID:-}
      - APPROVALS_TEAM_ID=${APPROVALS_TEAM_ID:-}
      
      # ==================== Optional Features ====================
      - EPM_ENABLED=${EPM_ENABLED:-false}
      - DEVICE_APPROVAL_ENABLED=${DEVICE_APPROVAL_ENABLED:-false}
      - EPM_POLL_INTERVAL=${EPM_POLL_INTERVAL:-120}
      - DEVICE_POLL_INTERVAL=${DEVICE_POLL_INTERVAL:-120}
      
      # ==================== TLS Configuration ====================
      # Set to 0 for environments with corporate proxies (e.g., Zscaler)
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-1}
    depends_on:
      commander:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Persist conversation references and data
      - teams-bot-data:/app/data
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3979/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volume for data persistence
volumes:
  teams-bot-data:
    driver: local
